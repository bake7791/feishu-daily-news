name: Fuel Cell Intelligence Daily

on:
  schedule:
    - cron: "0 0 * * *"  # 北京时间 08:00
  workflow_dispatch:

jobs:
  push-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Search & Push Fuel Cell Report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SEARCH_ENGINE: ${{ vars.SEARCH_ENGINE || 'bing' }}
        run: python push_news.py